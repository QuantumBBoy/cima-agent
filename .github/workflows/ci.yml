name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs anteriores de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          # uv.lock está gitignorado: clavamos la caché al pyproject.
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra dev

      # No necesita claves ni red: el smoke en vivo (-m live) está excluido por
      # addopts en pyproject.toml, así que aquí solo corre unit + integración mockeada.
      - name: Run tests
        run: uv run pytest -q
